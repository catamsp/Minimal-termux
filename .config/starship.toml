add_newline = true

format = '''
[笏娯楳](bold blue) [Capsd](bold blue) $directory$git_branch
[笏披楳](bold blue)$character'''

[hostname]
ssh_only = false
format = "on [$hostname](bold yellow) "
disabled = true

[directory]
style = "bold cyan"
truncation_length = 3
truncation_symbol = "窶ｦ/"

[character]
success_symbol = "[笶ｯ](bold green)"
error_symbol = "[笶ｯ](bold red)"

[git_branch]
symbol = "㬚瓦 "
style = "bold purple"
